name: Deploy backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull code and restart backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eu
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -eu
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${VPS_PORT:-22}" \
            -o BatchMode=yes \
            "$VPS_USER@$VPS_HOST" \
            'set -eu; cd /var/www/backend/Gia_phat-backend; git pull --ff-only origin main; ./venv/bin/pip install --disable-pip-version-check -r requirements.txt; sudo -n systemctl restart giaphat-backend; sleep 3; sudo -n systemctl is-active --quiet giaphat-backend; curl --fail --silent --show-error http://127.0.0.1:5000/ >/dev/null'
